[package]
name = "core_bin"
version = "0.1.0"
authors = ["zda"]
edition = "2018"

[[bin]]
name = "core_bin_web_main"
path = "./src/web_main.rs"

[[bin]]
name = "core_bin_postgres_fixtures"
path = "./src/postgres_fixtures.rs"

[dependencies]
actix-web = { version = "3.3.2" }
core_lib = { path = "./../../lib/core", version = "0.1.0" }

[profile.dev]
opt-level = 0

[profile.release]
opt-level = 3