[package]
name = "create_fixtures"
version = "0.1.0"
authors = ["zda"]
edition = "2021"

[[bin]]
name = "create_fixtures"
path = "./mod.rs"
test = true
doctest = true
bench = true
doc = true
proc-macro = false
harness = true
edition = "2021"
required-features = []

[dependencies]
application = { path = "./../../../..", package = "application", version = "0.1.0", default-features = true, features = [], optional = false }

[features]
default = []
facilitate_non_automatic_functional_testing = ["application/facilitate_non_automatic_functional_testing"]