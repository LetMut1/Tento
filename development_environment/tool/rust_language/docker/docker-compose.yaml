version: '3.8'

services: 
    rust_language:
        container_name: memis_rust_language
        build:
            context: ./service/rust_language/
            dockerfile: dockerfile
        environment: 
            USER: ${USER}
        volumes:
            - ./../../../../:/_memis
        ports:
            - 8080:80
        working_dir: /_memis
        restart: always
        tty: true
        init: true