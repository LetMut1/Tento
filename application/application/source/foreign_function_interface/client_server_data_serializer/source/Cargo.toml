[package]
name = "client_server_data_serializer"
version = "1.0.0"
authors = ["Zimin Dmitriy <dimazimin96@yandex.ru>"]
edition = "2021"
resolver = "2"
build = "./build.rs"

[lib]
name = "client_server_data_serializer"
path = "./source/mod.rs"
test = true
doctest = true
bench = true
doc = true
proc-macro = false
harness = true
edition = "2021"
crate-type = ["staticlib"]
required-features = []

[dependencies]
action_processor_incoming_outcoming = { path = "./../../../forced_crate/action_processor_incoming_outcoming", package = "action_processor_incoming_outcoming", version = "1.0.0", default-features = true, features = [], optional = false }
aggregate_error = { path = "./../../../forced_crate/aggregate_error", package = "aggregate_error", version = "1.0.0", default-features = true, features = [], optional = false }
formatter = { path = "./../../../forced_crate/formatter", package = "formatter", version = "1.0.0", default-features = true, features = [], optional = false }
libc = { package = "libc", version = "0.2.148", default-features = true, features = [], optional = false }
message_pack_serializer = { path = "./../../../forced_crate/message_pack_serializer", package = "message_pack_serializer", version = "1.0.0", default-features = true, features = [], optional = false }
serde = { package = "serde", version = "1.0.188", default-features = true, features = ["derive"], optional = false }
unified_report = { path = "./../../../forced_crate/unified_report", package = "unified_report", version = "1.0.0", default-features = true, features = [], optional = false }
void = { path = "./../../../forced_crate/void", package = "void", version = "1.0.0", default-features = true, features = [], optional = false }

[build-dependencies]
cargo-emit = { package = "cargo-emit", version = "0.2.1", default-features = true, features = [], optional = false }
cbindgen = { package = "cbindgen", version = "0.24.5", default-features = true, features = [], optional = false }
uuid = { package = "uuid", version = "0.8.2", default-features = true, features = ["v4"], optional = false }

[features]
default = []

[profile.dev]
opt-level = 0
debug = true
debug-assertions = true
overflow-checks = true
lto = false
panic = "unwind"
incremental = true
codegen-units = 256
rpath = false

[profile.dev.build-override]
opt-level = 0
codegen-units = 256

[profile.release]
opt-level = 3
debug = false
debug-assertions = false
overflow-checks = true
lto = "fat"
panic = "unwind"
incremental = false
codegen-units = 16
rpath = false

[profile.release.build-override]
opt-level = 3
codegen-units = 16

# TODO https://github.com/rust-lang/cargo/issues/6745#issuecomment-472667516
# Remove after solving the problem and configure in normal way.
[workspace]