[package]
name = "client_server_data_serializer"
version = "0.1.0"
authors = ["Zimin Dmitriy <dimazimin96@yandex.ru>"]
edition = "2021"
resolver = "2"
build = "./build.rs"

[lib]
name = "client_server_data_serializer"
path = "./mod.rs"
test = true
doctest = true
bench = true
doc = true
proc-macro = false
harness = true
edition = "2021"
crate-type = ["staticlib"]
required-features = []

[dependencies]
action_processor_incoming_outcoming = { path = "./../../../forced_crate/action_processor_incoming_outcoming", package = "action_processor_incoming_outcoming", version = "0.1.0", default-features = true, features = [], optional = false }
entity = { path = "./../../../forced_crate/entity", package = "entity", version = "0.1.0", default-features = true, features = [], optional = false }
libc = { package = "libc", version = "0.2.148", default-features = true, features = [], optional = false }
message_pack_serializer = { path = "./../../../forced_crate/message_pack_serializer", package = "message_pack_serializer", version = "0.1.0", default-features = true, features = [], optional = false }
serde = { package = "serde", version = "1.0.188", default-features = true, features = ["derive"], optional = false }
unified_report = { path = "./../../../forced_crate/unified_report", package = "unified_report", version = "0.1.0", default-features = true, features = [], optional = false }
void = { path = "./../../../forced_crate/void", package = "void", version = "0.1.0", default-features = true, features = [], optional = false }

[build-dependencies]
cargo-emit = { package = "cargo-emit", version = "0.2.1", default-features = true, features = [], optional = false }
cbindgen = { package = "cbindgen", version = "0.24.5", default-features = true, features = [], optional = false }
uuid = { package = "uuid", version = "0.8.2", default-features = true, features = ["v4"], optional = false }

[features]
default = []

[profile.release]
opt-level = "z"
# debug = false
# debug-assertions = false
# overflow-checks = true
lto = true
panic = "abort"
# incremental = false
codegen-units = 1
# rpath = false
strip = true  # Automatically strip symbols from the binary.

# TODO https://github.com/rust-lang/cargo/issues/6745#issuecomment-472667516
# Remove after solving the problem and configure in normal way.
[workspace]