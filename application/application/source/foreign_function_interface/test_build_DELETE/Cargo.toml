[package]
name = "service_test"
version = "0.1.0"
authors = ["Zimin Dmitriy <dimazimin96@yandex.ru>"]
edition = "2021"
build = "./build.rs"
resolver = "2"

[lib]
name = "service_test"
path = "./mod.rs"
test = true
doctest = true
bench = true
doc = true
proc-macro = false
harness = true
edition = "2021"
crate-type = ["staticlib"]
required-features = []

[dependencies]
libc = { package = "libc", version = "0.2.148", default-features = true, features = [], optional = false }

[build-dependencies]
cargo-emit = { package = "cargo-emit", version = "0.2.1", default-features = true, features = [], optional = false }
cbindgen = { package = "cbindgen", version = "^0.24", default-features = true, features = [], optional = false }
uuid = { package = "uuid", version = "^0.8", default-features = true, features = ["v4"], optional = false }

[features]
default = []

# TODO https://github.com/rust-lang/cargo/issues/6745#issuecomment-472667516
# Remove after solving the problem and configure in normal way.
[workspace]