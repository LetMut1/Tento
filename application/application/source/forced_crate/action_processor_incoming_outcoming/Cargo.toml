[package]
name = "action_processor_incoming_outcoming"
version = "0.1.0"
authors.workspace = true
edition = "2021"

[lib]
name = "action_processor_incoming_outcoming"
path = "./source/mod.rs"
test = true
doctest = true
bench = true
doc = true
proc-macro = false
harness = true
edition = "2021"
crate-type = ["lib"]
required-features = []

[dependencies]
serde = { package = "serde", version = "^1.0", default-features = true, features = ["derive"], optional = false }
entity = { path = "./../entity", package = "entity", version = "0.1.0", default-features = true, features = [], optional = false }
common_precedent = { path = "./../common_precedent", package = "common_precedent", version = "0.1.0", default-features = true, features = [], optional = false }
macro_rules = { path = "./../macro_rules", package = "macro_rules", version = "0.1.0", default-features = true, features = [], optional = false }

[features]
default = []
manual_testing = [
    "entity/manual_testing",
]