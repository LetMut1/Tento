[package]
name = "message_pack_serializer"
version = "0.1.0"
authors.workspace = true
edition = "2021"

[lib]
name = "message_pack_serializer"
path = "./mod.rs"
test = true
doctest = true
bench = true
doc = true
proc-macro = false
harness = true
edition = "2021"
crate-type = ["lib"]
required-features = []

[dependencies]
error_auditor = { path = "./../error_auditor", package = "error_auditor", version = "0.1.0", default-features = true, features = [], optional = false }
resource_error = { path = "./../resource_error", package = "resource_error", version = "0.1.0", default-features = true, features = [], optional = false }
rmp_serde = { package = "rmp-serde", version = "^0.15", default-features = true, features = [], optional = false }
serde = { package = "serde", version = "^1.0", default-features = true, features = ["derive"], optional = false }

[features]
default = []